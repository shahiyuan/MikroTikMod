name: MikroTik RouterOS V7 Release (ARM64)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS 版本 (例如: 7.21.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  patch-and-pack:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置 Python & Go 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip wget curl squashfs-tools git build-essential
          sudo pip3 install pefile

      - name: 下载 & Patch 主 NPK 包
        env:
          MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
          MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
          CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
          CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
          CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
          CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
          MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL }}
          CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL }}
          VERSION: ${{ inputs.version }}
          ARCH: arm64
        run: |
          echo "=== 下载 RouterOS 主包 ==="
          wget -q "https://download.mikrotik.com/routeros/${VERSION}/routeros-${VERSION}-${ARCH}.npk"

          echo "=== 执行 ARM64 Patch ==="
          sudo -E python3 patch_test.py npk routeros-${VERSION}-${ARCH}.npk
          mv routeros-${VERSION}-${ARCH}.npk routeros-${VERSION}-${ARCH}-patch.npk

      - name: 处理全量包 + 签名 + 定制 option
        env:
          VERSION: ${{ inputs.version }}
          ARCH: arm64
          MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.NEW_MIKRO_NPK_SIGN_PUBLIC_KEY }}
          MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.NEW_MIKRO_LICENSE_PUBLIC_KEY }}
          CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
          CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
          CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
          CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
        run: |
          echo "=== 下载全量包 ==="
          wget -q "https://download.mikrotik.com/routeros/$VERSION/all_packages-arm64-$VERSION.zip"
          mkdir -p all_packages-${ARCH}
          unzip -q all_packages-${ARCH}-${VERSION}.zip -d all_packages-${ARCH}/

          echo "=== 替换已 Patch 的主包 ==="
          rm -f all_packages-${ARCH}/routeros-${VERSION}-${ARCH}.npk
          cp routeros-${VERSION}-${ARCH}-patch.npk all_packages-${ARCH}/

          echo "=== 签名所有 NPK ==="
          for file in all_packages-${ARCH}/*.npk; do
            sudo -E python3 npk.py sign "$file" "$file"
          done

          echo "=== WiFi 驱动 ARM64 优化处理 ==="
          WIFI="all_packages-${ARCH}/wifi-qcom-${VERSION}-${ARCH}.npk"
          WIFIBE="all_packages-${ARCH}/wifi-qcom-be-${VERSION}-${ARCH}.npk"
          WIRE="all_packages-${ARCH}/wireless-${VERSION}-${ARCH}.npk"
          if [ -f "$WIFI" ]; then
            sudo -E python3 roswifi.py -i "$WIFI" -b ./bdwlanX ./bdwlanR -o "${WIFI%.npk}-X.npk" "${WIFI%.npk}-R.npk"
            rm -f "$WIFI" "$WIFIBE" "$WIRE"
          fi

          echo "=== 交叉编译 ARM64 mihomo ==="
          git clone --depth 1 -b Alpha https://github.com/ydhang2024/mihomo.git mihomo
          cd mihomo
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o ../../option-root/bin/mihomo main.go
          cd ..
          rm -rf mihomo
          chmod +x option-root/bin/mihomo

          echo "=== 打包 busybox ==="
          if [ -f "busybox/busybox_aarch64" ]; then
            cp busybox/busybox_aarch64 option-root/bin/busybox
            chmod +x option-root/bin/busybox
            for cmd in $(busybox/busybox_x86 --list); do
              ln -sf /pckg/option/bin/busybox option-root/bin/$cmd
            done
          fi

          echo "=== 制作 option.npk ==="
          mksquashfs option-root option.sfs -comp xz -b 256k -all-root -quiet
          TMPL=$(find all_packages-${ARCH} -name "gps-*.npk" | head -1)
          sudo -E python3 npk.py create "$TMPL" all_packages-${ARCH}/option-${VERSION}-${ARCH}.npk option option.sfs -desc="ARM64 Tools"

          echo "=== 打包最终全量包 ==="
          cd all_packages-${ARCH}
          zip -q -9 ../all_packages-${ARCH}-${VERSION}-patched.zip *.npk
          cd ..

          wget -q "https://download.mikrotik.com/routeros/${VERSION}/CHANGELOG" -O changelog.txt

      - name: Patch Netinstall (Windows)
        env:
          MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.NEW_MIKRO_NPK_SIGN_PUBLIC_KEY }}
          MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.NEW_MIKRO_LICENSE_PUBLIC_KEY }}
          CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
          CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
          CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
          CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
          VERSION: ${{ inputs.version }}
        run: |
          wget -q "https://download.mikrotik.com/routeros/${VERSION}/netinstall-${VERSION}.zip"
          unzip -q netinstall-${VERSION}.zip
          sudo -E python3 patch_test.py netinstall netinstall.exe
          zip -q netinstall-${VERSION}-patched.zip netinstall.exe

          rm -f netinstall.exe netinstall-${VERSION}.zip

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-arm64
          name: RouterOS ${{ inputs.version }} Patched | ARM64 专用
          body_path: changelog.txt
          files: |
            routeros-${{ inputs.version }}-arm64-patch.npk
            all_packages-arm64-${{ inputs.version }}-patched.zip
            netinstall-${{ inputs.version }}-patched.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
